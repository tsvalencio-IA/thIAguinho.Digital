<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>t.h.I.A.g.u.i.n.h.o | OMNI 4.0</title>
    
    <!-- Tailwind CSS & Ícones -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Three.js (Motor Gráfico 3D) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root { --jarvis-cyan: #00f0ff; --jarvis-blue: #0051ff; --bg-color: #02050a; }
        
        body, html { 
            font-family: 'Rajdhani', sans-serif; background-color: var(--bg-color); color: var(--jarvis-cyan); 
            overflow: hidden; margin: 0; height: 100%; width: 100%; touch-action: none; 
        }
        .tech-font { font-family: 'Share Tech Mono', monospace; }
        
        #avatar-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.9; pointer-events: none; }
        
        .holo-panel {
            background: rgba(0, 15, 30, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 240, 255, 0.2); box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.05);
        }

        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; opacity: 0.5;
        }

        .chat-area { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; z-index: 10; position: relative; padding-bottom: 20px; -webkit-overflow-scrolling: touch; }
        .chat-area::-webkit-scrollbar { width: 2px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--jarvis-cyan); }

        .msg { max-width: 95%; padding: 12px; margin-bottom: 12px; font-size: 1rem; line-height: 1.4; animation: glitch-in 0.3s ease-out forwards; position: relative; border-radius: 8px; word-wrap: break-word; }
        .msg-user { background: rgba(0, 80, 255, 0.15); border-right: 2px solid var(--jarvis-blue); margin-left: auto; text-align: right; }
        .msg-draft { background: rgba(245, 158, 11, 0.1); border-left: 2px dashed #f59e0b; margin-right: auto; font-size: 0.9rem; color: #cbd5e1; }
        .msg-truth { background: rgba(16, 185, 129, 0.15); border-left: 3px solid #10b981; margin-right: auto; box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        .msg-sys { text-align: center; font-size: 0.75rem; color: #64748b; letter-spacing: 1px; text-transform: uppercase; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; margin: 10px auto; width: fit-content; }

        .modal { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 50; }
        .modal.active { opacity: 1; pointer-events: auto; }

        @keyframes glitch-in { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        
        .processing { animation: pulse-border 1s infinite; }
        @keyframes pulse-border { 0% { border-color: var(--jarvis-cyan); box-shadow: 0 0 5px var(--jarvis-cyan); } 50% { border-color: white; box-shadow: 0 0 15px white; } 100% { border-color: var(--jarvis-cyan); box-shadow: 0 0 5px var(--jarvis-cyan); } }
    </style>
</head>
<body class="flex flex-col">

    <!-- MOTOR 3D: Robô ao Fundo -->
    <div id="avatar-container"></div>

    <!-- UI MOBILE -->
    <div class="relative z-10 flex flex-col h-full w-full p-2 pointer-events-none">
        
        <header class="flex justify-between items-center mb-2 pointer-events-auto holo-panel rounded-xl p-2 shrink-0">
            <div class="flex items-center gap-2">
                <div id="status-led" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444] animate-pulse"></div>
                <div>
                    <h1 class="text-xl tech-font font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-emerald-400 leading-none">
                        t.h.I.A.g.u.i.n.h.o.
                    </h1>
                    <span id="status-text" class="tech-font text-[9px] tracking-widest text-slate-400 uppercase block leading-none mt-1">INICIALIZANDO...</span>
                </div>
            </div>
            <button onclick="UI.toggleSetup()" class="text-cyan-400 p-2 border border-cyan-800 rounded-lg bg-black/50 active:bg-cyan-900 transition shadow-[0_0_10px_rgba(0,240,255,0.2)]">
                <i class="fas fa-key"></i>
            </button>
        </header>

        <div id="terminal" class="chat-area pointer-events-auto flex flex-col">
            <div class="msg-sys mt-2">SISTEMA OMNI CONECTANDO AO FIREBASE...</div>
        </div>

        <div class="mt-2 flex flex-col gap-2 pointer-events-auto shrink-0 holo-panel rounded-xl p-2 mb-1">
            <!-- Preview de Imagem Anexada -->
            <div id="image-preview-container" class="hidden relative w-16 h-16 border border-cyan-500 rounded overflow-hidden">
                <img id="image-preview" src="" class="w-full h-full object-cover">
                <button onclick="Jarvis.clearImage()" class="absolute top-0 right-0 bg-red-600 text-white w-5 h-5 flex items-center justify-center text-xs"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="flex gap-2 items-end w-full">
                <!-- Botão de Anexo de Imagem (Visão) -->
                <label for="file-upload" class="w-10 h-10 bg-cyan-900/50 border border-cyan-700 rounded-lg text-cyan-400 active:bg-cyan-600 transition flex items-center justify-center cursor-pointer shrink-0">
                    <i class="fas fa-paperclip"></i>
                    <input type="file" id="file-upload" accept="image/*" class="hidden" onchange="Jarvis.handleImageUpload(this)">
                </label>
                
                <div class="flex-1 flex items-center bg-black/60 border border-cyan-900/80 rounded-lg p-1">
                    <span class="tech-font text-cyan-600 pl-2 text-xs">></span>
                    <input type="text" id="cmd-input" class="w-full bg-transparent text-cyan-50 tech-font p-2 outline-none text-[16px] placeholder-cyan-800" placeholder="Comando ou pedido de imagem..." disabled>
                </div>
                
                <button id="btn-execute" onclick="Jarvis.executeCommand()" class="w-12 h-10 bg-cyan-900 border border-cyan-500 rounded-lg text-cyan-300 active:bg-cyan-600 transition flex items-center justify-center disabled:opacity-50 shrink-0" disabled>
                    <i class="fas fa-bolt"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONFIGURAÇÃO DAS CHAVES DAS IAS -->
    <div id="setup-modal" class="modal fixed inset-0 bg-black/95 backdrop-blur-lg flex items-center justify-center p-4">
        <div class="holo-panel rounded-2xl border-t-4 border-t-cyan-500 w-full max-w-md p-5 max-h-[90vh] overflow-y-auto pointer-events-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg tech-font text-cyan-400 tracking-widest"><i class="fas fa-network-wired"></i> APIS DE INTELIGÊNCIA</h2>
                <button onclick="UI.toggleSetup()" class="text-slate-500 active:text-cyan-400 p-2"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="bg-black/60 p-3 border border-cyan-900 rounded-lg space-y-3">
                    <label class="text-[10px] font-bold text-yellow-500 uppercase tracking-widest block border-b border-cyan-900 pb-1">Chaves (Fatiamento OMNI Seguro)</label>
                    <p class="text-[9px] text-slate-400 tech-font">O banco de dados Firebase já está integrado ao código fonte. Insira apenas as mentes da IA.</p>
                    
                    <div>
                        <span class="text-[9px] text-emerald-400 tech-font">GEMINI API (Juiz Central / Visão)</span>
                        <input type="password" id="key-gemini" class="w-full bg-transparent border-b border-cyan-800 text-sm text-white outline-none focus:border-emerald-400 p-1" placeholder="AIzaSy...">
                    </div>
                    <div>
                        <span class="text-[9px] text-orange-400 tech-font">GROQ API (Cérebro Lógico)</span>
                        <input type="password" id="key-groq" class="w-full bg-transparent border-b border-cyan-800 text-sm text-white outline-none focus:border-orange-400 p-1" placeholder="gsk_...">
                    </div>
                    <div>
                        <span class="text-[9px] text-purple-400 tech-font">OPENROUTER API (Modelos Livres)</span>
                        <input type="password" id="key-openrouter" class="w-full bg-transparent border-b border-cyan-800 text-sm text-white outline-none focus:border-purple-400 p-1" placeholder="sk-or-v1-...">
                    </div>
                    
                    <button onclick="DB.saveKeys()" class="w-full bg-cyan-600 text-black font-bold py-2 rounded text-[10px] tech-font tracking-widest active:bg-cyan-500 mt-2 shadow-[0_0_10px_rgba(0,240,255,0.5)]">
                        FATIAR TODAS E SALVAR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MÓDULOS DE LÓGICA JAVASCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // ==========================================
        // 0. CONFIGURAÇÃO FIREBASE CHUMBADA (HARDCODED)
        // ==========================================
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyAiykf5IqYbnHglovdxyRzXXmrk-GtHlzQ",
            authDomain: "thiaguinho-40a14.firebaseapp.com",
            databaseURL: "https://thiaguinho-40a14-default-rtdb.firebaseio.com",
            projectId: "thiaguinho-40a14",
            storageBucket: "thiaguinho-40a14.firebasestorage.app",
            messagingSenderId: "953851363533",
            appId: "1:953851363533:web:a912b840e5d268c5d16984"
        };

        // ==========================================
        // MÓDULO 1: ROBÔ 3D & LIP-SYNC
        // ==========================================
        window.Avatar3D = {
            scene: null, camera: null, renderer: null, headGroup: null, jawMesh: null, eyesMaterial: null,
            targetJaw: 0, isSpeaking: false, particles: null,
            
            init() {
                const container = document.getElementById('avatar-container');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.z = 8; this.camera.position.y = 0;

                this.renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(this.renderer.domElement);

                this.scene.add(new THREE.AmbientLight(0x001133, 2));
                const dirLight = new THREE.DirectionalLight(0x00f0ff, 1.5);
                dirLight.position.set(5, 5, 5);
                this.scene.add(dirLight);

                this.headGroup = new THREE.Group();
                const matBody = new THREE.MeshStandardMaterial({ color: 0x050f1a, metalness: 0.8, roughness: 0.2 });
                
                const skull = new THREE.Mesh(new THREE.BoxGeometry(2, 2.2, 2), matBody);
                skull.position.y = 0.5; this.headGroup.add(skull);

                this.eyesMaterial = new THREE.MeshStandardMaterial({ color: 0x00f0ff, emissive: 0x00f0ff, emissiveIntensity: 0.5 });
                const eyeGeo = new THREE.BoxGeometry(0.5, 0.15, 0.1);
                const lEye = new THREE.Mesh(eyeGeo, this.eyesMaterial); lEye.position.set(-0.5, 0.8, 1.01);
                const rEye = new THREE.Mesh(eyeGeo, this.eyesMaterial); rEye.position.set(0.5, 0.8, 1.01);
                this.headGroup.add(lEye, rEye);

                const jawGeo = new THREE.BoxGeometry(1.9, 0.6, 1.9);
                jawGeo.translate(0, -0.3, 0.2); 
                this.jawMesh = new THREE.Mesh(jawGeo, matBody);
                this.jawMesh.position.set(0, -0.6, 0); 
                this.headGroup.add(this.jawMesh);

                this.scene.add(this.headGroup);

                const pGeo = new THREE.BufferGeometry();
                const pVerts = [];
                for(let i=0; i<300; i++) pVerts.push((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*10 - 5);
                pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pVerts, 3));
                this.particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x00f0ff, size: 0.05, transparent: true, opacity: 0.3 }));
                this.scene.add(this.particles);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                this.animate();
            },

            setStatus(status) {
                if(status === 'idle') { this.eyesMaterial.emissive.setHex(0x00f0ff); this.eyesMaterial.emissiveIntensity = 0.5; }
                if(status === 'thinking') { this.eyesMaterial.emissive.setHex(0xff00ff); this.eyesMaterial.emissiveIntensity = 2; }
                if(status === 'consensus') { this.eyesMaterial.emissive.setHex(0x10b981); this.eyesMaterial.emissiveIntensity = 2.5; }
            },

            animate() {
                requestAnimationFrame(() => this.animate());
                this.headGroup.position.y = Math.sin(Date.now() * 0.002) * 0.1;
                this.headGroup.rotation.y = Math.sin(Date.now() * 0.0005) * 0.15;
                this.particles.rotation.y += 0.001;

                if(this.isSpeaking) {
                    if(Math.random() > 0.5) this.targetJaw = (Math.random() * 0.3) + 0.1;
                } else {
                    this.targetJaw = 0; 
                }
                this.jawMesh.rotation.x += (this.targetJaw - this.jawMesh.rotation.x) * 0.4;
                this.renderer.render(this.scene, this.camera);
            }
        };

        // ==========================================
        // MÓDULO 2: FIREBASE & FATIAMENTO
        // ==========================================
        window.DB = {
            app: null, db: null, isReady: false, 
            keys: { gemini: '', groq: '', openrouter: '' },

            split(key) {
                if(!key) return null; const s = Math.ceil(key.length / 4);
                return { p1: key.substr(0, s), p2: key.substr(s, s), p3: key.substr(s*2, s), p4: key.substr(s*3) };
            },
            join(obj) { return obj ? (obj.p1||'') + (obj.p2||'') + (obj.p3||'') + (obj.p4||'') : ''; },

            async autoConnect() {
                try {
                    // Usa a configuração Hardcoded
                    this.app = initializeApp(FIREBASE_CONFIG);
                    this.db = getDatabase(this.app);
                    
                    const led = document.getElementById('status-led');
                    led.className = "w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_10px_#34d399]";
                    document.getElementById('status-text').innerText = "MATRIZ OMNI CONECTADA";
                    document.getElementById('status-text').className = "tech-font text-[9px] tracking-widest text-emerald-400 uppercase block mt-1";
                    
                    document.getElementById('cmd-input').disabled = false;
                    document.getElementById('btn-execute').disabled = false;
                    this.isReady = true;

                    window.UI.logSys("RTDB Online. Carregando fragmentos de IA...");
                    await this.loadKeys();

                } catch(e) { 
                    window.UI.logSys("Erro crítico no Firebase: " + e.message); 
                }
            },

            async saveKeys() {
                if(!this.isReady) return;
                const gem = document.getElementById('key-gemini').value.trim();
                const groq = document.getElementById('key-groq').value.trim();
                const or = document.getElementById('key-openrouter').value.trim();

                let salvouAlgo = false;

                try {
                    if(gem) { await set(ref(this.db, 'jarvis_system/keys/gemini'), this.split(gem)); salvouAlgo = true; }
                    if(groq) { await set(ref(this.db, 'jarvis_system/keys/groq'), this.split(groq)); salvouAlgo = true; }
                    if(or) { await set(ref(this.db, 'jarvis_system/keys/openrouter'), this.split(or)); salvouAlgo = true; }
                    
                    if(salvouAlgo) {
                        alert("Mentes fatiadas e salvas!");
                        document.getElementById('key-gemini').value = '';
                        document.getElementById('key-groq').value = '';
                        document.getElementById('key-openrouter').value = '';
                        await this.loadKeys();
                        window.UI.toggleSetup();
                    }
                } catch(e) { alert("Erro ao salvar. Verifique as rules do Firebase para 'jarvis_system'."); }
            },

            async loadKeys() {
                if(!this.isReady) return;
                try {
                    const snap = await get(ref(this.db, 'jarvis_system/keys'));
                    if(snap.exists()) {
                        const data = snap.val();
                        if(data.gemini) this.keys.gemini = this.join(data.gemini);
                        if(data.groq) this.keys.groq = this.join(data.groq);
                        if(data.openrouter) this.keys.openrouter = this.join(data.openrouter);
                        
                        window.UI.logSys("Consenso Operacional. O que deseja criar?");
                        Jarvis.speak("Sistemas online e operacionais, senhor.");
                    } else {
                        window.UI.logSys("Chaves ausentes. Configure a Matriz de Inteligência no botão de chave superior.");
                    }
                } catch(e) { window.UI.logSys("Falha na leitura do banco."); }
            }
        };

        // ==========================================
        // MÓDULO 3: APIS (CORREÇÃO DE MODELOS E VISÃO)
        // ==========================================
        window.MentesAPI = {
            // Mudou para llama3-8b para garantir disponibilidade e evitar rate limits pesados da Groq
            async queryGroq(prompt) {
                if(!window.DB.keys.groq) return "Groq Ausente.";
                try {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST", headers: { "Authorization": `Bearer ${window.DB.keys.groq}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ model: "llama3-8b-8192", messages: [{role: "user", content: prompt}] })
                    });
                    const d = await res.json(); 
                    if(d.error) throw new Error(d.error.message);
                    return d.choices[0].message.content;
                } catch(e) { return "Erro Llama 3 (Groq): " + e.message; }
            },

            // Mudou para Meta Llama 3 no OpenRouter (Mais estável que o Mistral livre)
            async queryOpenRouter(prompt) {
                if(!window.DB.keys.openrouter) return "OpenRouter Ausente.";
                try {
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST", headers: { "Authorization": `Bearer ${window.DB.keys.openrouter}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ model: "meta-llama/llama-3-8b-instruct:free", messages: [{role: "user", content: prompt}] })
                    });
                    const d = await res.json(); 
                    if(d.error) throw new Error(d.error.message);
                    return d.choices[0].message.content;
                } catch(e) { return "Erro OpenRouter: " + e.message; }
            },

            // O Gemini atua como Juiz (Se não houver imagem)
            async queryGeminiJudge(prompt, answers) {
                if(!window.DB.keys.gemini) throw new Error("Chave Gemini ausente.");
                
                const instruction = "Você é t.h.I.A.g.u.i.n.h.o, a IA OMNI. Analise e corrija os rascunhos das IAs menores. Crie a VERDADE ABSOLUTA final. Se falharam, crie você mesmo. Trate o usuário por 'Senhor'.";
                const finalPrompt = `PEDIDO DO USUÁRIO: "${prompt}"\n\n--- DRAFT 1 ---\n${answers[0]}\n\n--- DRAFT 2 ---\n${answers[1]}\n\nSINTETIZE A VERDADE DEFINITIVA:`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${window.DB.keys.gemini}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }], systemInstruction: { parts: [{ text: instruction }] } })
                });
                const d = await res.json();
                if(d.error) throw new Error(d.error.message);
                return d.candidates[0].content.parts[0].text;
            },

            // O Gemini atua sozinho para ler imagens (Visão Computacional)
            async queryGeminiVision(prompt, base64Image) {
                if(!window.DB.keys.gemini) throw new Error("Chave Gemini ausente.");
                const instruction = "Você é t.h.I.A.g.u.i.n.h.o. Analise a imagem fornecida e atenda ao pedido do usuário. Trate-o por 'Senhor'.";
                
                const parts = [{ text: prompt }];
                if(base64Image) {
                    parts.push({ inlineData: { mimeType: "image/jpeg", data: base64Image } });
                }

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${window.DB.keys.gemini}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: parts }], systemInstruction: { parts: [{ text: instruction }] } })
                });
                const d = await res.json();
                if(d.error) throw new Error(d.error.message);
                return d.candidates[0].content.parts[0].text;
            },

            // O Gemini traduz e melhora o prompt de imagem antes de ir para o Pollinations
            async optimizeImagePrompt(userPrompt) {
                 if(!window.DB.keys.gemini) return userPrompt; // Fallback
                 const instruction = "Translate the user's concept into a highly detailed, comma-separated English prompt for an AI image generator (Stable Diffusion/Flux). Only return the English keywords, nothing else. Add terms like 'masterpiece, photorealistic, 8k resolution, cinematic lighting'.";
                 const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${window.DB.keys.gemini}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userPrompt }] }], systemInstruction: { parts: [{ text: instruction }] } })
                });
                const d = await res.json();
                if(d.error || !d.candidates) return userPrompt;
                return d.candidates[0].content.parts[0].text;
            }
        };

        // ==========================================
        // MÓDULO 4: J.A.R.V.I.S. CÉREBRO E INTERCEPTADOR
        // ==========================================
        window.Jarvis = {
            isWorking: false,
            imageBase64: null,

            handleImageUpload(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        // Remove o cabeçalho data:image/jpeg;base64, para a API do Gemini
                        const base64Data = e.target.result.split(',')[1];
                        this.imageBase64 = base64Data;
                        document.getElementById('image-preview').src = e.target.result;
                        document.getElementById('image-preview-container').classList.remove('hidden');
                        window.UI.logSys("Imagem carregada nos sensores óticos.");
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            },

            clearImage() {
                this.imageBase64 = null;
                document.getElementById('image-preview-container').classList.add('hidden');
                document.getElementById('file-upload').value = '';
            },

            async executeCommand() {
                if(this.isWorking) return;
                const input = document.getElementById('cmd-input');
                const cmd = input.value.trim();
                if(!cmd && !this.imageBase64) return;

                this.isWorking = true; input.value = ''; input.blur(); 
                document.getElementById('btn-execute').classList.add('processing');
                window.Avatar3D.setStatus('thinking');
                
                if(this.imageBase64) {
                    window.UI.addMsg('user', `<i class="fas fa-image text-cyan-500"></i> [Imagem Anexada] ${cmd}`);
                } else {
                    window.UI.addMsg('user', cmd);
                }

                try {
                    // ROTEADOR INTELIGENTE DE INTENÇÃO
                    const pLower = cmd.toLowerCase();
                    const querImagem = ['crie uma imagem', 'gere uma imagem', 'desenhe', 'uma foto de', 'imagem de', 'crie uma foto'].some(kw => pLower.includes(kw));

                    if (querImagem && !this.imageBase64) {
                        await this.generateVisual(cmd);
                    } else if (this.imageBase64) {
                        await this.generateVisionAnalysis(cmd);
                    } else {
                        await this.generateConsensus(cmd);
                    }
                } catch (e) {
                    window.UI.logSys("FALHA MATRIZ: " + e.message);
                    this.speak("Senhor, falha crítica na conexão das APIs.");
                } finally {
                    this.isWorking = false;
                    document.getElementById('btn-execute').classList.remove('processing');
                    window.Avatar3D.setStatus('idle');
                    this.clearImage(); // Limpa anexo após envio
                }
            },

            // AVALIA FOTO ENVIADA PELO USUÁRIO (Visão)
            async generateVisionAnalysis(cmd) {
                window.UI.logSys("Acionando Sensores de Visão Computacional (Gemini)...");
                const prompt = cmd || "Analise esta imagem minuciosamente.";
                const truth = await window.MentesAPI.queryGeminiVision(prompt, this.imageBase64);
                window.UI.addMsg('truth', truth);
                this.speak(truth);
            },

            // ROTA TEXTO/CÓDIGO (Multi-IA)
            async generateConsensus(cmd) {
                window.UI.logSys("Iniciando varredura (Groq & OpenRouter)...");
                
                const drafts = await Promise.all([
                    window.MentesAPI.queryGroq(cmd),
                    window.MentesAPI.queryOpenRouter(cmd)
                ]);

                window.UI.addMsg('draft', `<b>[DRAFT Llama]:</b> ${drafts[0].substring(0, 150)}...`);
                window.UI.addMsg('draft', `<b>[DRAFT Meta]:</b> ${drafts[1].substring(0, 150)}...`);

                window.UI.logSys("Acionando Juiz Central (Gemini) para Síntese Absoluta...");
                window.Avatar3D.setStatus('consensus');

                const truth = await window.MentesAPI.queryGeminiJudge(cmd, drafts);
                
                window.UI.addMsg('truth', truth);
                this.speak(truth);
            },

            // ROTA GERAÇÃO DE IMAGEM 8K (Pollinations)
            async generateVisual(cmd) {
                window.UI.logSys("Traduzindo e otimizando o pedido para a Forja Visual...");
                window.Avatar3D.setStatus('consensus');
                
                // O Gemini pega o prompt em português e transforma em um prompt de alta qualidade em Inglês
                const optimizedPrompt = await window.MentesAPI.optimizeImagePrompt(cmd);
                window.UI.logSys(`[Prompt Otimizado]: ${optimizedPrompt}`);
                
                const encodedPrompt = encodeURIComponent(optimizedPrompt);
                const seed = Math.floor(Math.random() * 999999);
                const url = `https://pollinations.ai/p/${encodedPrompt}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;

                const imgHtml = `
                    <div class="border border-cyan-800 p-2 bg-black/50 rounded overflow-hidden mt-2">
                        <div class="text-[9px] tech-font text-cyan-600 mb-1 uppercase tracking-widest">Forja Visual Concluída</div>
                        <img src="${url}" class="w-full h-auto border border-cyan-500/50 rounded shadow-[0_0_15px_rgba(0,240,255,0.2)]" alt="Render" onload="window.UI.scrollDown()">
                        <a href="${url}" target="_blank" download class="block mt-2 text-[10px] text-center bg-cyan-900/40 hover:bg-cyan-800 text-cyan-400 py-2 rounded transition">SALVAR IMAGEM 8K</a>
                    </div>
                `;
                
                window.UI.addMsg('ai', imgHtml, false);
                this.speak("A imagem foi forjada baseada nas suas diretrizes e transferida para a tela.");
            },

            speak(text) {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                
                const rxBlock = new RegExp('```[\\s\\S]*?```', 'g');
                const rxMarks = new RegExp('[#*`_]', 'g');
                let cleanText = text.replace(rxBlock, " Os códigos foram gerados na tela principal.");
                cleanText = cleanText.replace(rxMarks, '');
                
                const utt = new SpeechSynthesisUtterance(cleanText);
                utt.lang = 'pt-BR'; 
                utt.pitch = 0.2; 
                utt.rate = 1.15; 

                utt.onstart = () => { window.Avatar3D.isSpeaking = true; };
                utt.onend = () => { window.Avatar3D.isSpeaking = false; window.Avatar3D.targetJaw = 0; };
                utt.onerror = () => { window.Avatar3D.isSpeaking = false; };

                window.speechSynthesis.speak(utt);
            }
        };

        // ==========================================
        // MÓDULO 5: UI BLINDADA CONTRA BUGS DE CHAT
        // ==========================================
        window.UI = {
            toggleSetup() { document.getElementById('setup-modal').classList.toggle('active'); },
            
            logSys(text) {
                const term = document.getElementById('terminal');
                term.innerHTML += `<div class="msg-sys">${text}</div>`;
                this.scrollDown();
            },

            formatHolo(text) {
                const rxCode = new RegExp('```([\\w]*)\\n([\\s\\S]*?)```', 'g');
                const rxBold = new RegExp('\\*\\*(.*?)\\*\\*', 'g');
                const rxNewLine = new RegExp('\\n', 'g');

                let f = text;
                f = f.replace(rxCode, '<div class="bg-black/90 border-l-2 border-emerald-500 p-2 my-2 font-mono text-[9px] md:text-xs overflow-x-auto text-emerald-300 rounded shadow-inner"><code>$2</code></div>');
                f = f.replace(rxBold, '<strong class="text-white">$1</strong>');
                f = f.replace(rxNewLine, '<br>');
                return f;
            },

            addMsg(type, content, format = true) {
                const term = document.getElementById('terminal');
                const div = document.createElement('div');
                div.className = `msg msg-${type}`;
                
                if(type === 'user') {
                    div.innerHTML = `<span class="tech-font text-[9px] text-blue-500 mb-1 block">>> SENHOR</span>${content}`;
                } else if(type === 'draft') {
                    div.innerHTML = content;
                } else if(type === 'truth') {
                    const finalContent = format ? this.formatHolo(content) : content;
                    div.innerHTML = `<span class="tech-font text-[9px] text-emerald-400 mb-1 block">>> VEREDITO OMNI</span>${finalContent}`;
                } else if(type === 'ai') {
                    div.innerHTML = `<span class="tech-font text-[9px] text-cyan-400 mb-1 block">>> t.h.I.A.g.u.i.n.h.o.</span>${content}`;
                }
                
                term.appendChild(div);
                this.scrollDown();
            },
            
            scrollDown() {
                const term = document.getElementById('terminal');
                setTimeout(() => { term.scrollTop = term.scrollHeight; }, 100);
            }
        };

        // INICIALIZAÇÃO
        window.onload = () => {
            window.Avatar3D.init();
            
            // Auto-conecta ao Firebase usando o objeto chumbado no código
            window.DB.autoConnect();

            document.getElementById('cmd-input').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') { e.preventDefault(); window.Jarvis.executeCommand(); }
            });
        };
    </script>
</body>
</html>
