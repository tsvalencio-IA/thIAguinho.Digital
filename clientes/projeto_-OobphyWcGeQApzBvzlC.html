<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Organização de Tarefas e Comunicação Interna | thIAguinho Soluções</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .task-input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .task-input-section input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .task-input-section button {
            padding: 12px 20px;
            background-color: #28a745; /* Green for add */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .task-input-section button:hover {
            background-color: #218838;
        }
        .task-list {
            list-style: none;
            padding: 0;
        }
        .task-list li {
            background-color: #e9ecef;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        .task-list li.completed {
            background-color: #d4edda;
            text-decoration: line-through;
            color: #6c757d;
        }
        .task-list li button.delete-btn {
            background-color: #dc3545; /* Red for delete */
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }
        .task-list li button.delete-btn:hover {
            background-color: #c82333;
        }
        .task-list li input[type="checkbox"] {
            margin-right: 10px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .task-item-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        /* TRIAL BLOCKER STYLES */
        #trial-blocker {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95); /* Semi-transparent black */
            color: white;
            z-index: 99999; /* High z-index to cover everything */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 2em;
            padding: 20px;
            box-sizing: border-box;
            line-height: 1.5;
        }
        #trial-blocker.active {
            display: flex; /* Show when active */
        }

        /* FEEDBACK CHAT STYLES */
        .feedback-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007bff; /* Blue for feedback */
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: background-color 0.3s ease;
        }
        .feedback-button:hover {
            background-color: #0056b3;
        }

        .feedback-modal {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .feedback-modal.active {
            display: flex;
        }
        .feedback-modal-content {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            position: relative;
        }
        .feedback-modal-content h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .feedback-modal-content textarea {
            width: calc(100% - 20px);
            min-height: 120px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            resize: vertical;
        }
        .feedback-modal-content .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .feedback-modal-content .modal-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .feedback-modal-content .modal-actions .send-btn {
            background-color: #28a745;
            color: white;
        }
        .feedback-modal-content .modal-actions .send-btn:hover {
            background-color: #218838;
        }
        .feedback-modal-content .modal-actions .cancel-btn {
            background-color: #6c757d;
            color: white;
        }
        .feedback-modal-content .modal-actions .cancel-btn:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Organização de Tarefas</h1>
        <div class="task-input-section">
            <input type="text" id="newTaskInput" placeholder="Adicionar nova tarefa ou mensagem...">
            <button id="addTaskButton">Adicionar Tarefa</button>
        </div>
        <ul id="taskList" class="task-list">
            <!-- As tarefas serão adicionadas aqui -->
        </ul>
    </div>

    <!-- TRIAL BLOCKER -->
    <div id="trial-blocker">
        Atenção: A sua versão de demonstração expirou. Entre em contato com a thIAguinho Soluções para adquirir o sistema completo.
    </div>

    <!-- FEEDBACK CHAT BUTTON -->
    <button class="feedback-button" id="openFeedbackBtn">Gostou? Fale com o Thiago</button>

    <!-- FEEDBACK CHAT MODAL -->
    <div class="feedback-modal" id="feedbackModal">
        <div class="feedback-modal-content">
            <h3>Seu feedback é muito importante!</h3>
            <textarea id="feedbackText" placeholder="Digite sua mensagem para o Thiago aqui..."></textarea>
            <div class="modal-actions">
                <button class="cancel-btn" id="closeFeedbackBtn">Cancelar</button>
                <button class="send-btn" id="sendFeedbackBtn">Enviar Feedback</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '-OobphyWcGeQApzBvzlC';
        const FIREBASE_FEEDBACK_URL = `https://thiaguinho-40a14-default-rtdb.firebaseio.com/projetos_capturados/${CLIENT_ID}/feedbacks.json`;
        const TRIAL_USES_KEY = 'thiaguinho_trial_uses';
        const MAX_TRIAL_USES = 5;

        // --- Lógica de Trial (Teste) ---
        let trialUses = 0;
        const trialBlocker = document.getElementById('trial-blocker');

        function loadTrialUses() {
            const storedUses = localStorage.getItem(TRIAL_USES_KEY);
            trialUses = storedUses ? parseInt(storedUses, 10) : 0;
            checkTrialStatus();
        }

        function incrementTrialUses() {
            trialUses++;
            localStorage.setItem(TRIAL_USES_KEY, trialUses);
            console.log(`Trial uses: ${trialUses}/${MAX_TRIAL_USES}`); // Para debug
            checkTrialStatus();
        }

        function checkTrialStatus() {
            if (trialUses >= MAX_TRIAL_USES) {
                blockSystem();
            }
        }

        function blockSystem() {
            trialBlocker.classList.add('active');
            // Impede interação com elementos subjacentes e desabilita todos os botões/inputs
            document.body.style.overflow = 'hidden';
            document.querySelectorAll('button, input, textarea, a').forEach(el => {
                el.disabled = true;
                el.style.pointerEvents = 'none'; 
            });
        }

        // --- Lógica de Gerenciamento de Tarefas (Ação de Valor) ---
        const newTaskInput = document.getElementById('newTaskInput');
        const addTaskButton = document.getElementById('addTaskButton');
        const taskList = document.getElementById('taskList');

        addTaskButton.addEventListener('click', () => {
            const taskText = newTaskInput.value.trim();
            if (taskText !== '') {
                if (trialUses < MAX_TRIAL_USES) { // Só permite adicionar se o trial não expirou
                    addTask(taskText);
                    newTaskInput.value = '';
                    incrementTrialUses(); // Esta é a "ação completa de valor"
                } else {
                    checkTrialStatus(); // Apenas garante que o bloqueador esteja visível
                }
            }
        });

        function addTask(text) {
            const listItem = document.createElement('li');
            listItem.innerHTML = `
                <div class="task-item-content">
                    <input type="checkbox">
                    <span>${text}</span>
                </div>
                <button class="delete-btn">Excluir</button>
            `;
            taskList.appendChild(listItem);

            // Adiciona listener para checkbox
            const checkbox = listItem.querySelector('input[type="checkbox"]');
            checkbox.addEventListener('change', () => {
                listItem.classList.toggle('completed', checkbox.checked);
            });

            // Adiciona listener para botão de excluir
            const deleteButton = listItem.querySelector('.delete-btn');
            deleteButton.addEventListener('click', () => {
                listItem.remove();
            });
        }

        // --- Lógica de Chat de Feedback ---
        const openFeedbackBtn = document.getElementById('openFeedbackBtn');
        const feedbackModal = document.getElementById('feedbackModal');
        const closeFeedbackBtn = document.getElementById('closeFeedbackBtn');
        const sendFeedbackBtn = document.getElementById('sendFeedbackBtn');
        const feedbackText = document.getElementById('feedbackText');

        openFeedbackBtn.addEventListener('click', () => {
            if (trialUses < MAX_TRIAL_USES) { // Só abre o feedback se o trial não expirou
                feedbackModal.classList.add('active');
            } else {
                checkTrialStatus(); // Apenas garante que o bloqueador esteja visível
            }
        });

        closeFeedbackBtn.addEventListener('click', () => {
            feedbackModal.classList.remove('active');
            feedbackText.value = ''; // Limpa a área de texto ao fechar
        });

        sendFeedbackBtn.addEventListener('click', async () => {
            const message = feedbackText.value.trim();
            if (message === '') {
                alert('Por favor, digite sua mensagem antes de enviar.');
                return;
            }

            try {
                const response = await fetch(FIREBASE_FEEDBACK_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        texto: message,
                        data: new Date().toISOString()
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    alert('Mensagem enviada com sucesso ao Thiago!');
                    feedbackModal.classList.remove('active');
                    feedbackText.value = '';
                } else {
                    alert('Erro ao enviar mensagem. Por favor, tente novamente.');
                    console.error('Firebase response not OK:', response.status, await response.text());
                }
            } catch (error) {
                alert('Erro de conexão ao enviar mensagem. Verifique sua internet.');
                console.error('Fetch error:', error);
            }
        });

        // Inicializa o status do trial ao carregar a página
        document.addEventListener('DOMContentLoaded', loadTrialUses);
    </script>
</body>
</html>
