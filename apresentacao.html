<!-- NOME DO ARQUIVO: apresentacao.html -->
<!-- LOCALIZAÇÃO: Pasta principal do projeto -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Entrevista com a thIAguinho</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; font-family: sans-serif; }
        
        /* O Vídeo de Fundo que substitui a Realidade Aumentada */
        #video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz o vídeo preencher a tela toda do celular */
            z-index: 0;
            background-color: #0f172a;
        }

        #ui-layer { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            pointer-events: none; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            background: linear-gradient(to top, rgba(15,23,42,1) 0%, rgba(15,23,42,0) 65%);
        }
        
        .pointer-events-auto { pointer-events: auto; }
        
        .chat-container { background: rgba(15, 23, 42, 0.95); border-top: 2px solid #dc2626; border-radius: 20px 20px 0 0; padding: 15px; display: flex; flex-direction: column; max-height: 60vh; width: 100%; max-width: 500px; margin: 0 auto; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .chat-display { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding-right: 5px; scroll-behavior: smooth;}
        
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; max-width: 85%; animation: fadeIn 0.3s ease; }
        .msg.bot { background: #1e293b; color: white; border-bottom-left-radius: 2px; align-self: flex-start; border: 1px solid #334155; }
        .msg.user { background: #dc2626; color: white; border-bottom-right-radius: 2px; align-self: flex-end; }
        
        .opcoes-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; align-self: flex-start; max-width: 90%; animation: fadeIn 0.5s ease; }
        .btn-opcao { background-color: #dc2626; color: white; border: 1px solid #ef4444; border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; pointer-events: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-opcao:hover { background-color: #b91c1c; transform: scale(1.05); }
        .btn-opcao:active { transform: scale(0.95); }

        .input-area { display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid #334155; background: #020617; color: white; outline: none; }
        .btn-action { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; color: white; transition: 0.3s; }
        .btn-mic { background: #334155; }
        .btn-mic.listening { background: #dc2626; transform: scale(1.1); animation: pulse 1s infinite; }
        .btn-send { background: #dc2626; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 15px #dc2626; } 100% { transform: scale(1); } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- VÍDEO DO MASCOTE (Fica rodando em loop no fundo) -->
    <!-- Ele começa mudo (muted) para o navegador permitir o carregamento automático -->
    <video id="vid" src="./assets/mascote.mp4" autoplay loop muted playsinline id="video-bg"></video>

    <!-- TELA INICIAL: OBRIGATÓRIA PARA LIBERAR O ÁUDIO DO ROBÔ -->
    <div id="start-screen" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center text-white">
        <div class="w-32 h-32 bg-red-600 rounded-full mb-6 flex items-center justify-center animate-pulse shadow-[0_0_30px_rgba(220,38,38,0.6)]">
            <i class='bx bx-bot text-7xl'></i>
        </div>
        <h2 class="text-2xl font-bold mb-2 text-center px-4">Entrevista Inteligente</h2>
        <p class="text-slate-400 mb-10 text-center px-6 text-sm">Aumente o volume do seu dispositivo.</p>
        <button id="btn-start" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full text-lg shadow-lg transition transform hover:scale-105">
            Iniciar Conversa
        </button>
        <a href="index.html" class="mt-6 text-slate-500 text-sm hover:text-white">Voltar ao site</a>
    </div>

    <!-- TELA DO CHAT -->
    <div id="ui-layer" class="hidden">
        <div class="pointer-events-auto chat-container">
            <div class="flex justify-between items-center mb-3 pb-2 border-b border-slate-700">
                <div class="flex items-center gap-2">
                    <div class="relative">
                        <i class='bx bx-bot text-red-500 text-3xl'></i>
                        <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-slate-900 rounded-full"></span>
                    </div>
                    <div>
                        <span class="font-bold text-white text-sm block leading-none">Mascote Arquiteto</span>
                        <span class="text-[10px] text-slate-400">Online agora</span>
                    </div>
                </div>
                <a href="index.html" class="text-slate-400 hover:text-white bg-slate-800 p-1.5 rounded-lg"><i class='bx bx-x text-xl'></i></a>
            </div>
            
            <div class="chat-display" id="chat-display"></div>
            
            <div class="input-area">
                <button id="btn-mic" class="btn-action btn-mic shadow-md"><i class='bx bxs-microphone'></i></button>
                <input type="text" id="user-input" placeholder="Digite ou escolha uma opção...">
                <button id="btn-send" class="btn-action btn-send shadow-md"><i class='bx bx-send'></i></button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/ar-logic.js"></script>
</body>
</html>
